name: plant-science-paradigm-shift
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip>=24.0
  - pip:
      # Database
      - duckdb>=1.1.0
      - pyarrow>=15.0
      - orjson>=3.9
      - lxml>=5.0
      # Data processing
      - pandas>=2.2
      - numpy>=1.26
      # NLP / embeddings
      - transformers>=4.39
      - sentence-transformers>=3.0
      - tokenizers>=0.19
      - torch>=2.0
      # Topic modelling
      - bertopic>=0.16
      - hdbscan>=0.8.33
      - umap-learn>=0.5
      - scikit-learn>=1.4
      # Statistics
      - powerlaw>=1.5
      - statsmodels>=0.14
      - pyfixest>=0.18
      # Network analysis
      - networkx>=3.2
      - python-louvain>=0.16
      - python-igraph>=0.11
      - leidenalg>=0.10
      # Visualisation
      - matplotlib>=3.7
      - seaborn>=0.13
      # API clients / utilities
      - requests>=2.31
      - aiohttp>=3.9
      - ratelimit>=2.2
      - tqdm>=4.66
      - pyyaml>=6.0
      - python-dotenv>=1.0
      # Dev + tests
      - pytest>=8.0
      - pytest-cov>=5.0
      - ruff>=0.5
